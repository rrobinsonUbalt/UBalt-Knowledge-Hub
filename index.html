<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>UBalt OIE Knowledge Hub</title>
    <script src="https://cdn.tailwindcss.com"></script>
</head>
<body class="bg-gray-50 font-sans">

    <!-- 1. THE LIST VIEW (Visible by default) -->
    <div id="listView">
        <header class="bg-white border-b p-6 mb-8">
            <h1 class="text-3xl font-bold text-blue-900">Knowledge Hub</h1>
            <p class="text-gray-600">University of Baltimore | Office of Institutional Effectiveness</p>
        </header>

        <main class="max-w-7xl mx-auto px-6">
            <!-- Search & Tags -->
            <div class="bg-white p-6 rounded-lg shadow-sm mb-6">
                <input type="text" id="searchInput" oninput="updateSearch()" placeholder="Search definitions or tags..." class="w-full p-3 border rounded-lg mb-4">
                <div class="flex gap-2 flex-wrap">
                    <span class="text-xs font-bold text-gray-400 uppercase">Quick Tags:</span>
                    <button onclick="filterByTag('federal definitions')" class="text-xs bg-gray-200 px-2 py-1 rounded hover:bg-blue-100">federal definitions</button>
                    <button onclick="filterByTag('internal definitions')" class="text-xs bg-gray-200 px-2 py-1 rounded hover:bg-blue-100">internal definitions</button>
                    <button onclick="filterByTag('dashboard methodologies')" class="text-xs bg-gray-200 px-2 py-1 rounded hover:bg-blue-100">dashboard methodologies</button>
                </div>
            </div>

            <!-- Table -->
            <div class="bg-white shadow rounded-lg overflow-hidden">
                <table class="min-w-full">
                    <thead class="bg-gray-100">
                        <tr>
                            <th class="px-6 py-3 text-left text-xs font-bold uppercase text-gray-600">Term</th>
                            <th class="px-6 py-3 text-left text-xs font-bold uppercase text-gray-600">Functional Area</th>
                            <th class="px-6 py-3 text-left text-xs font-bold uppercase text-gray-600">Tags</th>
                        </tr>
                    </thead>
                    <tbody id="tableBody"></tbody>
                </table>
            </div>
        </main>
    </div>

    <!-- 2. THE DETAIL VIEW (Hidden by default) -->
    <div id="detailView" class="hidden min-h-screen bg-white">
        <nav class="p-6 border-b bg-gray-50">
            <button onclick="showList()" class="text-blue-700 font-bold hover:underline">← Back to Full List</button>
        </nav>
        <main class="max-w-4xl mx-auto p-8">
            <h2 id="detName" class="text-4xl font-black text-blue-900 mb-2"></h2>
            <div id="detTags" class="flex gap-2 mb-8"></div>

            <div class="grid grid-cols-1 gap-12">
                <section>
                    <h3 class="text-sm font-bold text-gray-400 uppercase tracking-widest border-b pb-2 mb-4">Functional Definition</h3>
                    <p id="detFunc" class="text-lg text-gray-800 leading-relaxed"></p>
                </section>

                <section class="bg-blue-50 p-6 rounded-xl border border-blue-100">
                    <h3 class="text-sm font-bold text-blue-900 uppercase tracking-widest mb-4">Codes & Logic</h3>
                    <pre id="detCodes" class="font-mono text-sm text-blue-800 whitespace-pre-wrap"></pre>
                </section>

                <section>
                    <h3 class="text-sm font-bold text-gray-400 uppercase tracking-widest border-b pb-2 mb-4">Detailed Comments</h3>
                    <div id="detComments" class="text-gray-700 space-y-4 leading-relaxed"></div>
                </section>
            </div>
        </main>
    </div>

    <script>
        // YOUR MINI-DATABASE
        const knowledgeData = [
            {
                id: 1,
                name: "First Time Flag",
                area: "Enrollment (EIS)",
                tags: ["federal definitions", "MHEC"],
                definition: "A flag that indicates the student is enrolled for the first time at any institution.",
                codes: "0 = High School\n1 = First-time Undergraduate\n2 = Continuing\n3 = First-time Graduate",
                comments: "A student who has no prior postsecondary experience... [This can be as long as you want!]"
            }
        ];

        function renderTable(data) {
            const html = data.map(item => `
                <tr onclick="showDetail(${item.id})" class="border-b hover:bg-blue-50 cursor-pointer">
                    <td class="px-6 py-4 font-bold text-blue-700">${item.name}</td>
                    <td class="px-6 py-4 text-sm text-gray-600">${item.area}</td>
                    <td class="px-6 py-4 text-xs text-gray-400">${item.tags.join(', ')}</td>
                </tr>
            `).join('');
            document.getElementById('tableBody').innerHTML = html;
        }

        function showDetail(id) {
            const item = knowledgeData.find(d => d.id === id);
            document.getElementById('detName').innerText = item.name;
            document.getElementById('detFunc').innerText = item.definition;
            document.getElementById('detCodes').innerText = item.codes;
            document.getElementById('detComments').innerText = item.comments;
            document.getElementById('detTags').innerHTML = item.tags.map(t => `<span class="bg-gray-100 px-2 py-1 rounded text-xs">${t}</span>`).join('');
            
            document.getElementById('listView').classList.add('hidden');
            document.getElementById('detailView').classList.remove('hidden');
            window.scrollTo(0,0);
        }

        function showList() {
            document.getElementById('listView').classList.remove('hidden');
            document.getElementById('detailView').classList.add('hidden');
        }

        function updateSearch() {
            const term = document.getElementById('searchInput').value.toLowerCase();
            const filtered = knowledgeData.filter(d => d.name.toLowerCase().includes(term) || d.tags.some(t => t.includes(term)));
            renderTable(filtered);
        }

        function filterByTag(tag) {
            document.getElementById('searchInput').value = tag;
            updateSearch();
        }

        renderTable(knowledgeData);
    </script>
</body>
</html>
